# Release CI — prebuilt binaries for the sos-kit "1 lệnh" installer (sos-kit P064).
# Trigger: push a tag `v*` (e.g. v0.1.0). Builds the 3 ratified targets
# (mac-arm64 / linux-x64 / win-x64) and attaches them to a GitHub Release.
# Asset naming contract (consumed by sos-kit install.sh): <bin>-<target-triple>[.exe]
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-pc-windows-msvc
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package asset
        shell: bash
        run: |
          BIN=inv-gate
          EXT=""
          [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          cp "target/${{ matrix.target }}/release/${BIN}${EXT}" "${BIN}-${{ matrix.target }}${EXT}"
          echo "ASSET=${BIN}-${{ matrix.target }}${EXT}" >> "$GITHUB_ENV"
          # sha256: prefer sha256sum (linux + git-bash-windows), fall back to shasum -a 256 (mac)
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${BIN}-${{ matrix.target }}${EXT}" > "${BIN}-${{ matrix.target }}${EXT}.sha256"
          else
            shasum -a 256 "${BIN}-${{ matrix.target }}${EXT}" > "${BIN}-${{ matrix.target }}${EXT}.sha256"
          fi
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const draft = releases.data.find(r => r.tag_name === tag && r.draft);
            if (!draft) {
              core.setFailed(`No draft release found for tag ${tag}`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: draft.id,
              draft: false,
            });
            console.log(`Published release ${draft.id} for tag ${tag}`);
